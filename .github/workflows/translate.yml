name: Translate

on:
  # Automatic: when English content or prompts change
  push:
    branches:
      - master
    paths:
      - "docs/en/docs/**/*.md"
      - "docs/*/llm-prompt.md"
      - "_scripts/general-llm-prompt.md"

  # Manual trigger
  workflow_dispatch:
    inputs:
      language:
        description: "Language code (empty = all with changes)"
        type: string
      command:
        description: "Command"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - list-outdated
          - list-missing
          - list-orphaned
          - sync

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      languages_outdated: ${{ steps.detect.outputs.languages_outdated }}
      languages_fix: ${{ steps.detect.outputs.languages_fix }}
      command: ${{ steps.detect.outputs.command }}
      has_work: ${{ steps.detect.outputs.has_work }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4

      - name: Detect work
        id: detect
        working-directory: _scripts
        run: |
          COMMAND="${{ github.event_name == 'push' && 'auto' || inputs.command }}"
          uv run translate.py ci-detect \
            --event-name "${{ github.event_name }}" \
            --command "$COMMAND" \
            ${{ inputs.language && format('--language "{0}"', inputs.language) || '' }} \
            ${{ github.event.before && format('--before-sha "{0}"', github.event.before) || '' }} \
            ${{ github.event.sha && format('--after-sha "{0}"', github.event.sha) || '' }} \
            >> $GITHUB_OUTPUT

  translate:
    needs: detect
    if: needs.detect.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v4

      - name: Run translation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: _scripts
        run: |
          uv run translate.py ci-run \
            --command "${{ needs.detect.outputs.command }}" \
            --languages-outdated '${{ needs.detect.outputs.languages_outdated }}' \
            --languages-fix '${{ needs.detect.outputs.languages_fix }}'

      - name: Create PR
        if: ${{ !startsWith(needs.detect.outputs.command, 'list-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        working-directory: _scripts
        run: |
          uv run translate.py ci-pr --command "${{ needs.detect.outputs.command }}"
