name: Publish docs [dev]

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: pip install mkdocs-material mkdocs-enumerate-headings-plugin mkdocs-quiz

      - name: Build all languages
        run: |
          mkdir -p combined

          for mkdocs_file in docs/*/mkdocs.yml; do
            lang=$(basename $(dirname "$mkdocs_file"))
            echo "Building $lang..."
            mkdocs build -f "$mkdocs_file" -d "$GITHUB_WORKSPACE/site-$lang"

            if [ "$lang" = "en" ]; then
              cp -r "site-$lang"/* combined/
            else
              mkdir -p "combined/$lang"
              cp -r "site-$lang"/* "combined/$lang/"
            fi
          done

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy to gh-pages
        run: |
          VERSION="0.dev"
          ALIAS="development"

          # Move combined site out of the way before checkout
          mv combined /tmp/combined

          # Fetch gh-pages if it exists
          git fetch origin gh-pages:gh-pages 2>/dev/null || true

          # Check if gh-pages exists
          if git show-ref --verify --quiet refs/heads/gh-pages; then
            git checkout gh-pages
            rm -rf "$VERSION" "$ALIAS"
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Move combined back and copy to version directories
          mv /tmp/combined combined
          cp -r combined "$VERSION"
          cp -r combined "$ALIAS"
          rm -rf combined

          # Update versions.json for mike compatibility
          python3 << 'EOF'
          import json
          from pathlib import Path

          versions_file = Path("versions.json")
          if versions_file.exists():
              versions = json.loads(versions_file.read_text())
          else:
              versions = []

          # Remove existing entry for this version
          versions = [v for v in versions if v.get("version") != "0.dev"]

          # Add new entry at the beginning
          versions.insert(0, {
              "version": "0.dev",
              "title": "0.dev",
              "aliases": ["development"]
          })

          versions_file.write_text(json.dumps(versions, indent=2))
          EOF

          # Commit and push
          git add -A
          git commit -m "Deploy development docs" --allow-empty
          git push origin gh-pages --force
