name: Publish docs

on:
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: "Docs version (leave empty for dev build)"
      latest:
        type: boolean
        description: "Set as 'latest' alias"
        default: true

permissions:
  contents: write

jobs:
  discover-languages:
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.find.outputs.languages }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: docs
      - uses: astral-sh/setup-uv@v5
      - name: Find languages
        id: find
        run: echo "languages=$(uv run .github/scripts/deploy_docs.py discover-languages)" >> $GITHUB_OUTPUT

  build:
    needs: discover-languages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: ${{ fromJson(needs.discover-languages.outputs.languages) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material mkdocs-enumerate-headings-plugin mkdocs-quiz
      - run: mkdocs build -f docs/${{ matrix.lang }}/mkdocs.yml -d ${{ github.workspace }}/site-${{ matrix.lang }}
      - uses: actions/upload-artifact@v4
        with:
          name: site-${{ matrix.lang }}
          path: site-${{ matrix.lang }}/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version info
        id: version
        run: |
          uv run .github/scripts/deploy_docs.py get-version-info \
            --event-name "${{ github.event_name }}" \
            --release-tag "${{ github.event.release.tag_name }}" \
            --input-version "${{ github.event.inputs.version }}" \
            --input-latest "${{ github.event.inputs.latest || 'true' }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Deploy to gh-pages
        run: |
          uv run .github/scripts/deploy_docs.py deploy \
            --version "${{ steps.version.outputs.version }}" \
            --alias "${{ steps.version.outputs.alias }}" \
            --is-release "${{ steps.version.outputs.is_release }}" \
            --artifacts-dir artifacts
