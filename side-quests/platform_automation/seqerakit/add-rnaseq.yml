# Add rnaseq-nf-$USERNAME to the Launchpad (the imperative contrast to Terraform).
#
# This ADDS a pipeline to the Launchpad. It does not launch it. Re-running errors
# unless you pass --overwrite, because the pipeline already exists. That is the
# imperative model: each run is an action, not a desired state.
#
# seqerakit expands ${USERNAME} from the environment, so set it first:
#
#   export USERNAME=$USER
#
# Set the workspace and compute-env names to match your workshop workspace.
pipelines:
  - name: "rnaseq-nf-${USERNAME}"
    url: "https://github.com/nextflow-io/rnaseq-nf"
    workspace: "my-org/platform-automation"
    description: "rnaseq-nf for ${USERNAME}, added with seqerakit"
    compute-env: "azure-batch-manual"
    work-dir: "az://nf-work/work"
    revision: "master"
