<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 860" width="1100" height="860">
  <!-- svg-source:excalidraw -->

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a9eed"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="860" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="bold" fill="#1e1e1e">Parameters vs Configuration</text>
  <text x="550" y="58" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#757575">How inputs and settings reach your pipeline</text>

  <!-- Left zone: Parameters -->
  <rect x="20" y="80" width="510" height="640" rx="16" fill="#dbe4ff" fill-opacity="0.3" stroke="#4a9eed" stroke-width="1"/>

  <!-- Right zone: Configuration -->
  <rect x="570" y="80" width="510" height="640" rx="16" fill="#ffd8a8" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1"/>

  <!-- Parameters header -->
  <rect x="60" y="100" width="430" height="52" rx="10" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="275" y="132" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e3a5f">Parameters — What to process</text>

  <!-- Configuration header -->
  <rect x="610" y="100" width="430" height="52" rx="10" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2"/>
  <text x="825" y="132" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#7c2d12">Configuration — How to run</text>

  <!-- Parameter examples -->
  <text x="80" y="190" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#2563eb">Controls:</text>
  <text x="100" y="218" font-family="Courier New, monospace" font-size="14" fill="#1e1e1e">--input</text>
  <text x="270" y="218" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#1e1e1e">samplesheet path</text>
  <text x="100" y="243" font-family="Courier New, monospace" font-size="14" fill="#1e1e1e">--outdir</text>
  <text x="270" y="243" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#1e1e1e">output directory</text>
  <text x="100" y="268" font-family="Courier New, monospace" font-size="14" fill="#1e1e1e">--genome</text>
  <text x="270" y="268" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#1e1e1e">reference genome</text>
  <text x="100" y="293" font-family="Courier New, monospace" font-size="14" fill="#1e1e1e">--skip_trim</text>
  <text x="270" y="293" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#1e1e1e">skip a step</text>

  <!-- Config examples -->
  <text x="630" y="190" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#c05000">Controls:</text>
  <text x="650" y="218" font-family="Courier New, monospace" font-size="14" fill="#1e1e1e">process.cpus</text>
  <text x="830" y="218" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#1e1e1e">CPU allocation</text>
  <text x="650" y="243" font-family="Courier New, monospace" font-size="14" fill="#1e1e1e">process.memory</text>
  <text x="830" y="243" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#1e1e1e">memory limits</text>
  <text x="650" y="268" font-family="Courier New, monospace" font-size="14" fill="#1e1e1e">ext.args</text>
  <text x="830" y="268" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#1e1e1e">tool arguments</text>
  <text x="650" y="293" font-family="Courier New, monospace" font-size="14" fill="#1e1e1e">executor</text>
  <text x="830" y="293" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#1e1e1e">where to run</text>

  <!-- Set via: Parameters -->
  <text x="80" y="345" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#2563eb">Set via:</text>
  <rect x="80" y="360" width="400" height="38" rx="8" fill="#ffffff" stroke="#4a9eed" stroke-width="1"/>
  <text x="280" y="384" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#1e1e1e">nextflow run ... --param value</text>

  <rect x="80" y="408" width="400" height="38" rx="8" fill="#ffffff" stroke="#4a9eed" stroke-width="1"/>
  <text x="280" y="432" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#1e1e1e">nextflow run ... -params-file params.yaml</text>

  <!-- Set via: Config -->
  <text x="630" y="345" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#c05000">Set via:</text>
  <rect x="630" y="360" width="400" height="38" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="830" y="384" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#1e1e1e">nextflow run ... -c custom.config</text>

  <rect x="630" y="408" width="400" height="38" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="830" y="432" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#1e1e1e">nextflow run ... -profile name</text>

  <!-- Validation box -->
  <rect x="130" y="500" width="260" height="55" rx="10" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="260" y="534" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#15803d">nf-schema validates</text>

  <!-- Arrow: params to validation -->
  <line x1="260" y1="460" x2="260" y2="498" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Arrow: validation to execution -->
  <path d="M 310 555 C 380 610, 440 640, 500 658" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Arrow: config to execution -->
  <path d="M 830 460 C 780 560, 680 630, 600 658" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Execution box -->
  <rect x="420" y="650" width="260" height="60" rx="12" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="550" y="686" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#5b21b6">Pipeline Execution</text>

  <!-- Warning box -->
  <rect x="240" y="760" width="620" height="45" rx="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="1"/>
  <text x="550" y="788" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#991b1b">Don't put params in config files — nf-schema can't validate them there</text>
</svg>
