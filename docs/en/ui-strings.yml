# UI strings for translation - English source
# These strings are used by index_page_hook.py for course landing pages
# and in mkdocs.yml for cookie consent.
#
# When adding a new language, copy this file to docs/<lang>/ui-strings.yml
# and translate all values.

index_page:
  course_summary: "Course summary"
  additional_information: "Additional information"
  technical_requirements: "Technical requirements"
  learning_objectives: "Learning objectives"
  audience_prerequisites: "Audience & prerequisites"
  course_videos: "Course videos"

defaults:
  technical_requirements: >-
    You will need a GitHub account OR a local installation of Nextflow. Our training courses are compatible with Nextflow version 25.10.2 or later and require the use of the v2 parser **EXCEPT the Hello nf-core course**, which requires the v1 parser.
    See [Environment options](../envsetup/index.md) for more details.
  videos: >-
    Videos are available for each chapter, featuring an instructor working
    through the exercises. The video for each part of the course is embedded
    at the top of the corresponding page.
  view_playlist: "View the playlist on YouTube"
